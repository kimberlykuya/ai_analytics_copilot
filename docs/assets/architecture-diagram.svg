<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">AI Analytics Copilot Architecture</title>
  <desc id="desc">Simple boxes and arrows architecture from user to API, retrieval and generation services, and database.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .box { fill: #ffffff; stroke: #16324f; stroke-width: 2; rx: 12; }
      .title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #10243a; }
      .label { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #10243a; }
      .small { font: 14px 'Segoe UI', Arial, sans-serif; fill: #28445f; }
      .arrow { stroke: #2c5a7d; stroke-width: 2.5; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c5a7d" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520" />
  <text class="title" x="600" y="40" text-anchor="middle">AI Analytics Copilot - Simple RAG Architecture</text>

  <rect class="box" x="40" y="110" width="190" height="90" />
  <text class="label" x="135" y="145" text-anchor="middle">Business User</text>
  <text class="small" x="135" y="170" text-anchor="middle">Natural language query</text>

  <rect class="box" x="300" y="110" width="220" height="90" />
  <text class="label" x="410" y="145" text-anchor="middle">Next.js UI + API</text>
  <text class="small" x="410" y="170" text-anchor="middle">POST /api/query</text>

  <rect class="box" x="610" y="60" width="230" height="90" />
  <text class="label" x="725" y="95" text-anchor="middle">Embedding Service</text>
  <text class="small" x="725" y="120" text-anchor="middle">all-MiniLM-L6-v2</text>

  <rect class="box" x="610" y="190" width="230" height="90" />
  <text class="label" x="725" y="225" text-anchor="middle">ChromaDB</text>
  <text class="small" x="725" y="250" text-anchor="middle">Metric definition retrieval</text>

  <rect class="box" x="930" y="60" width="230" height="90" />
  <text class="label" x="1045" y="95" text-anchor="middle">Gemini 2.5 Flash</text>
  <text class="small" x="1045" y="120" text-anchor="middle">SQL + final answer generation</text>

  <rect class="box" x="930" y="190" width="230" height="90" />
  <text class="label" x="1045" y="225" text-anchor="middle">PostgreSQL</text>
  <text class="small" x="1045" y="250" text-anchor="middle">analytics.* governed views</text>

  <rect class="box" x="300" y="340" width="860" height="110" />
  <text class="label" x="730" y="375" text-anchor="middle">Semantic Layer (7 governed metrics)</text>
  <text class="small" x="730" y="402" text-anchor="middle">total_revenue, active_customers, conversion_rate, average_order_value, order_fulfillment_time,</text>
  <text class="small" x="730" y="424" text-anchor="middle">revenue_by_category, customer_retention_rate</text>

  <path class="arrow" d="M230 155 H300" />
  <path class="arrow" d="M520 132 H610" />
  <path class="arrow" d="M520 178 H610" />
  <path class="arrow" d="M840 105 H930" />
  <path class="arrow" d="M840 235 H930" />
  <path class="arrow" d="M1045 150 V190" />
  <path class="arrow" d="M1045 280 V340" />
  <path class="arrow" d="M410 200 V340" />
</svg>
