<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Grounded Answer Versus Out-of-Scope Rejection</title>
  <desc id="desc">Illustrative UI screenshot showing a grounded answer and an out-of-scope refusal response.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #ffffff; stroke: #1f3b57; stroke-width: 2; rx: 14; }
      .title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #10243a; }
      .subtitle { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #16324f; }
      .text { font: 14px 'Segoe UI', Arial, sans-serif; fill: #28445f; }
      .badgeGood { fill: #e7f6ec; stroke: #2d7a46; stroke-width: 1.5; rx: 8; }
      .badgeWarn { fill: #fff4e5; stroke: #b77310; stroke-width: 1.5; rx: 8; }
      .good { fill: #1f6d3d; font: 700 13px 'Segoe UI', Arial, sans-serif; }
      .warn { fill: #8a5a09; font: 700 13px 'Segoe UI', Arial, sans-serif; }
      .code { font: 12px Consolas, 'Courier New', monospace; fill: #20344a; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="620" />
  <text class="title" x="600" y="42" text-anchor="middle">AI Analytics Copilot Response Behavior</text>

  <rect class="panel" x="50" y="80" width="530" height="500" />
  <text class="subtitle" x="315" y="114" text-anchor="middle">Grounded Answer</text>
  <rect class="badgeGood" x="78" y="135" width="175" height="30" />
  <text class="good" x="166" y="155" text-anchor="middle">GROUNDED ANSWER</text>
  <text class="text" x="78" y="200">Question: What is the overall order conversion rate?</text>
  <text class="text" x="78" y="230">Answer: The conversion rate is 97.02%.</text>
  <text class="text" x="78" y="254">Definition: delivered_orders / total_orders * 100</text>
  <text class="text" x="78" y="278">Source metric: analytics.conversion_rate</text>
  <text class="subtitle" x="78" y="320">Generated SQL</text>
  <text class="code" x="78" y="345">SELECT SUM(delivered_orders) * 100.0 / SUM(total_orders)</text>
  <text class="code" x="78" y="365">AS conversion_rate_pct</text>
  <text class="code" x="78" y="385">FROM analytics.conversion_rate;</text>

  <rect class="panel" x="620" y="80" width="530" height="500" />
  <text class="subtitle" x="885" y="114" text-anchor="middle">Out-of-Scope Rejection</text>
  <rect class="badgeWarn" x="648" y="135" width="240" height="30" />
  <text class="warn" x="768" y="155" text-anchor="middle">OUTSIDE SEMANTIC MODEL</text>
  <text class="text" x="648" y="200">Question: What is customer lifetime value by channel?</text>
  <text class="text" x="648" y="230">Response: I cannot answer this with the current model.</text>
  <text class="text" x="648" y="254">Reason: Channel and CLV are not among the 7 governed metrics.</text>
  <text class="text" x="648" y="278">Safety behavior: refuse to hallucinate unsupported definitions.</text>
  <text class="subtitle" x="648" y="320">Returned Signal</text>
  <text class="code" x="648" y="345">status: outside_scope</text>
  <text class="code" x="648" y="365">sql: null</text>
  <text class="code" x="648" y="385">badge: OUTSIDE SEMANTIC MODEL</text>
</svg>
